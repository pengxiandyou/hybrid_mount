name: Build Hybrid Mount for Android

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    env:
      ANDROID_API_LEVEL: 29
      TARGET_ARCH: aarch64-linux-android
      NDK_VERSION: r29
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        submodules: recursive
    
    - name: Setup NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: ${{ env.NDK_VERSION }}
        add-to-path: true
        link-to-sdk: true
    
    - name: Setup Rust toolchain
      uses: dtolnay/rust-toolchain@nightly
      with:
        targets: ${{ env.TARGET_ARCH }}
        components: rust-src, clippy, rustfmt
    
    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2
      with:
        prefix-key: v0-rust
        add-job-id-key: true
    
    - name: Install dependencies
      run: |
        sudo apt update && sudo apt install -y \
          gcc-multilib g++-multilib \
          pkg-config libssl-dev \
          android-sdk-build-tools
        cargo install cargo-ndk --locked
        mkdir -p output target/${{ env.TARGET_ARCH }}/release
        chmod -R 777 .
    
    - name: Build Hybrid Mount
      run: |
        # 获取 NDK 路径和版本
        NDK_HOME=${ANDROID_NDK_HOME}
        NDK_SYSROOT="${NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/sysroot"
        NDK_LIB_PATH="${NDK_SYSROOT}/usr/lib/${{ env.TARGET_ARCH }}/${{ env.ANDROID_API_LEVEL }}"
        
        # 验证库文件（同时检查静态库和动态库）
        echo "=== Checking liblog files ==="
        ls -la ${NDK_LIB_PATH}/ | grep log
        ls -la ${NDK_SYSROOT}/usr/lib/${{ env.TARGET_ARCH }}/ | grep log
        
        # 配置 Cargo（关键修复：移除冲突参数）
        mkdir -p .cargo
        cat > .cargo/config.toml << EOF
        [target.${{ env.TARGET_ARCH }}]
        linker = "${NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android${{ env.ANDROID_API_LEVEL }}-clang"
        ar = "${NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar"
        rustflags = [
            # 基础优化
            "-C", "opt-level=3",
            "-C", "lto=thin",
            # 正确的链接器配置
            "-C", "link-arg=-fuse-ld=lld",
            "-C", "link-arg=--target=aarch64-linux-android${{ env.ANDROID_API_LEVEL }}",
            # 显式指定库路径（使用绝对路径）
            "-C", "link-arg=-L${NDK_LIB_PATH}",
            "-C", "link-arg=-L${NDK_SYSROOT}/usr/lib/${{ env.TARGET_ARCH }}",
            # 链接必要的系统库（静态优先）
            "-C", "link-arg=-Wl,-Bstatic",
            "-C", "link-arg=-llog",
            "-C", "link-arg=-Wl,-Bdynamic",
            # 基础系统库
            "-C", "link-arg=-lc",
            "-C", "link-arg=-lm",
            "-C", "link-arg=-ldl",
            # 移除冲突的 PIE 参数
            "-C", "link-arg=-fPIE",
            # NDK 必要的链接参数
            "-C", "link-arg=-zrelro",
            "-C", "link-arg=-znow",
        ]
        [build]
        target = "${{ env.TARGET_ARCH }}"
        EOF
        
        # 显示配置文件内容（调试用）
        cat .cargo/config.toml
        
        # 直接使用 cargo build 而非 cargo-ndk（避免参数覆盖）
        export CC_aarch64_linux_android="${NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android${{ env.ANDROID_API_LEVEL }}-clang"
        export CXX_aarch64_linux_android="${NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android${{ env.ANDROID_API_LEVEL }}-clang++"
        export AR_aarch64_linux_android="${NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar"
        export LD_aarch64_linux_android="${NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/ld.lld"
        
        # 构建
        cargo build --target ${{ env.TARGET_ARCH }} --release --verbose
        
        # 复制输出文件
        mkdir -p output/arm64-v8a
        cp target/${{ env.TARGET_ARCH }}/release/hybrid-mount output/arm64-v8a/
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: hybrid-mount-android-arm64-v8a
        path: output/
